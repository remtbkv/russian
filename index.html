<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#faf9f6" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Русский</title>
    <!-- Apply saved theme before first paint to avoid a light-mode flash, and tint
         the status bar to match so there's no light strip up top in dark mode. -->
    <script>
      try {
        var dark = localStorage.getItem('ru:dark') === 'true'
        if (dark) document.documentElement.classList.add('dark')
        var m = document.querySelector('meta[name="theme-color"]')
        if (m) m.setAttribute('content', dark ? '#16161a' : '#faf9f6')
      } catch (e) {}
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=PT+Serif:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
